kind = "web"
previewPath = "/iic-app/"
title = "IIC App"
version = "1.0.0"
id = "artifacts/iic-app"
router = "path"

[[services]]
name = "web"
paths = [ "/iic-app/" ]
localPort = 20236

[services.development]
run = "pnpm --filter @workspace/iic-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iic-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/iic-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20236"
BASE_PATH = "/iic-app/"
