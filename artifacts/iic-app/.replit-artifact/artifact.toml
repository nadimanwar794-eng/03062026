kind = "web"
previewPath = "/"
title = "IIC Learning Platform"
version = "1.0.0"
id = "artifacts/iic-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20236

[services.development]
run = "pnpm --filter @workspace/iic-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iic-app", "run", "build" ]
publicDir = "artifacts/iic-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20236"
BASE_PATH = "/"
