<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIC – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f2044;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Inter, -apple-system, sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    img { width: 110px; height: 110px; border-radius: 24px; margin-bottom: 28px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 15px; color: #93b4e0; max-width: 280px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #d4a017;
      color: #0f2044;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <img src="/pwa-192x192.png" alt="IIC Logo" />
  <h1>You're Offline</h1>
  <p>Check your internet connection and try again. Previously viewed content may still be available.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
